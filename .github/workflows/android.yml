name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Install Dependencies
      run: npm ci || npm install
      
    - name: Build Web Assets
      env:
        VITE_SUPABASE_URL: https://oqfxbygwdkdgzizqycgp.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xZnhieWd3ZGtkZ3ppenF5Y2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTg0NDAsImV4cCI6MjA5NzA3NDQ0MH0.93CIu8b2frKShuWaDWwKhCScc3LsM6VJ5JAcm3LX59A
      run: npm run build
      
    - name: Capacitor Sync
      run: npx cap sync android
      
    - name: Build Android Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
