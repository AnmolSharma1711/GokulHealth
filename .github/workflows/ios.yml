name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: npm ci || npm install
      
    - name: Build Web Assets
      run: npm run build
      
    - name: Capacitor Sync
      run: npx cap sync ios
      
    - name: Build iOS App (Simulator/No Sign)
      working-directory: ./ios/App
      run: xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' build
