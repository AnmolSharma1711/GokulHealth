name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      run: npm ci || npm install
      
    - name: Build Web Assets
      env:
        VITE_SUPABASE_URL: https://oqfxbygwdkdgzizqycgp.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xZnhieWd3ZGtkZ3ppenF5Y2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTg0NDAsImV4cCI6MjA5NzA3NDQ0MH0.93CIu8b2frKShuWaDWwKhCScc3LsM6VJ5JAcm3LX59A
      run: npm run build
      
    - name: Capacitor Sync
      run: npx cap sync ios
      
    - name: Build iOS Release Archive
      working-directory: ./ios/App
      run: xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -destination 'generic/platform=iOS' archive -archivePath build/App.xcarchive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      
    - name: Upload iOS Archive
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Release-Archive
        path: ios/App/build/App.xcarchive
